title: Learning Blog
description: Notes and records
author: Yuqing Zhou

# If repo is named username.github.io, leave baseurl empty.
# If repo is a project repo (e.g. learning-blog), set baseurl: "/learning-blog"
baseurl: "/learning-blog"
url: "https://yuqing-zhou.github.io"

markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
