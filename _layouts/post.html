---
layout: default
---
<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%Y-%m-%d" }}
      {% if page.categories %}
        {% for cat in page.categories %}
          <a class="category-tag" href="{{ '/categories/' | append: cat | append: '.html' | relative_url }}">{{ cat }}</a>
        {% endfor %}
      {% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
